services:

  # 1. Keycloak (IdP)
  keycloak:
    container_name: keycloak
    hostname: keycloak
    image: quay.io/keycloak/keycloak:26.5.6
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - internal
      - external
    restart: unless-stopped

  # 2. Redis
  redis:
    container_name: redis
    hostname: redis
    image: redis:8.6.2-alpine
    networks:
      - internal
    restart: unless-stopped

  # 3. Redis Insight (Web UI)
  redis-insight:
    container_name: redis-insight
    hostname: redis-insight
    image: redis/redisinsight:3.2.0
    ports:
      - "8001:5540"
    networks:
      - internal
      - external
    restart: unless-stopped

  # 4. Kong Data Plane
  kong-dp:
    container_name: kong-dp
    hostname: kong-dp
    image: kong/kong-gateway:3.13
    env_file:
      - .env
      - .env_kong_konnect
    environment:
      KONG_ROLE: data_plane
      KONG_DATABASE: "off"
      KONG_KONNECT_MODE: "on"
      KONG_VITALS: "off"
      KONG_CLUSTER_MTLS: pki
      KONG_CLUSTER_CERT: /etc/kong/certs/tls.crt
      KONG_CLUSTER_CERT_KEY: /etc/kong/certs/tls.key
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ROUTER_FLAVOR: expressions
      KONG_LOG_LEVEL: debug
    volumes:
      - ./certs:/etc/kong/certs:ro
    ports:
      - "8000:8000"
      - "8443:8443"
    networks:
      - internal
      - external
    restart: unless-stopped

networks:
  internal:
    name: intra-net
    driver: bridge
    internal: true
  external:
    name: hands-net
    driver: bridge
