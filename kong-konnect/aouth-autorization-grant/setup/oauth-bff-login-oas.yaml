openapi: 3.1.0
info:
  title: BFF Auth
  version: 1.0.0
  description: BFF 認証インフラエンドポイントです。
servers:
  - url: http://localhost:8000
x-kong-name: oauth-bff-login
x-kong-service-defaults:
  protocol: http
  host: localhost
  port: 8000
paths:

  # BFF Login Initiation Endpoint
  /handson/oauth/bff/login:
    get:
      x-kong-route-defaults:
        strip_path: true
      responses:
        '302':
          description: Keycloak ログイン画面へリダイレクト

      x-kong-plugin-openid-connect:
        name: openid-connect
        config:
          issuer: "http://keycloak:8080/realms/handson"
          client_id:
            - "${{ env \"DECK_KC_CLIENT_ID_OIDC_BFF\" }}"
          client_secret:
            - "${{ env \"DECK_KC_CLIENT_SECRET_OIDC_BFF\" }}"
          auth_methods:
            - session
            - authorization_code
          redirect_uri:
            - "http://localhost:8000/handson/oauth/bff/login"
          login_action: redirect
          login_tokens: []
          login_redirect_uri:
            - "http://localhost:8000/handson/oauth/bff/callback"
          session_storage: redis
          session_secret: "a-very-secret-key-that-is-at-least-32-chars"
          session_cookie_name: "kong_session"
          session_cookie_path: "/handson/oauth/"
          session_cookie_httponly: true
          session_cookie_secure: false
          session_cookie_samesite: Lax
          session_rolling_timeout: 3600
          session_idling_timeout: 900
          redis:
            host: "redis"
            port: 6379
            database: 0
          upstream_access_token_header: "Authorization"

  # BFF Login Callback Endpoint
  /handson/oauth/bff/callback:
    get:
      x-kong-route-defaults:
        strip_path: true
      responses:
        '200':
          description: ログイン完了後のリダイレクト受け口 (JavaScript で元の URL へ自動遷移)

      x-kong-plugin-request-termination:
        name: request-termination
        config:
          status_code: 200
          content_type: "text/html; charset=utf-8"
          body: |
            <!DOCTYPE html>
            <html lang="ja">
            <head>
              <meta charset="UTF-8">
              <title>Login Successful</title>
            </head>
            <body>
              <p>Login complete. Redirecting you back to the original page...</p>
              <script>
                var AUTO_FETCH_KEY = 'bff_auto_fetch';
                var returnTo = sessionStorage.getItem(AUTO_FETCH_KEY);
                if (returnTo) {
                  sessionStorage.removeItem(AUTO_FETCH_KEY);
                  location.replace(returnTo);
                }
              </script>
            </body>
            </html>
